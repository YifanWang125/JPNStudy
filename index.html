<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 N4 → N2 · 30日の道</title>
<!-- theme: set BEFORE css to avoid a dark→light flash (FOUC). default dark. -->
<script>(function(){try{var t=localStorage.getItem('jpn-theme')||'dark';var d=t==='auto'?((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark'):t;document.documentElement.setAttribute('data-theme',d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=20260604z24">
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="logo">日本語 <b>N4→N2</b><span id="day-num" class="day-num"></span></div>
    <nav class="page-nav" id="page-nav">
      <button data-p="home" class="active">🏠<span class="pnl"> 主页</span></button>
      <button data-p="daily">📖<span class="pnl"> 每日</span></button>
      <button data-p="general">📚<span class="pnl"> 基础</span></button>
      <button data-p="scenarios">🗺️<span class="pnl"> 场景</span></button>
      <button data-p="test">📝<span class="pnl"> 测试</span></button>
      <button data-p="produce">🗣️<span class="pnl"> 产出</span></button>
      <button data-p="notes">📓<span class="pnl"> 笔记</span></button>
    </nav>
    <div class="top-spacer"></div>
    <span id="daily-controls">
      <button class="map-toggle" id="map-toggle">🗺️<span class="ctl-label"> 30天地图</span></button>
      <button class="toggle-furi" id="furi-toggle">ふりがな</button>
      <div class="day-nav">
        <button id="prev" title="前の日">‹</button>
        <select class="day-pick" id="day-pick"></select>
        <button id="next" title="次の日">›</button>
      </div>
    </span>
    <button class="gear-btn" id="theme-btn" title="浅色 / 深色">🌙</button>
    <button class="gear-btn" id="gear-btn" title="设置 / 备份 / 发音引擎">⚙️</button>
  </div>
  <div class="progress-line"><i id="prog-fill"></i></div>
</header>

<!-- 30-day map -->
<div id="map-view" class="wrap"></div>

<!-- PAGE: daily -->
<main id="page-daily" class="wrap">

  <div class="day-head" id="day-head"></div>

  <!-- planned-day placeholder -->
  <div id="planned" style="display:none"></div>

  <!-- real lesson -->
  <div id="lesson" style="display:none">
    <div class="tabs" id="tabs"></div>
    <div class="panel"><div id="panel-body"></div></div>
  </div>

</main>

<!-- PAGE: general reference -->
<main id="page-general" class="wrap" style="display:none"></main>

<!-- PAGE: scenarios (situational Japanese) -->
<main id="page-scenarios" class="wrap" style="display:none"></main>

<!-- PAGE: test -->
<main id="page-test" class="wrap" style="display:none"></main>

<!-- PAGE: home (personalized dashboard) -->
<main id="page-home" class="wrap" style="display:none"></main>

<!-- PAGE: produce (production gym — build/write/speak, built by produce.js) -->
<main id="page-produce" class="wrap" style="display:none"></main>

<!-- PAGE: notes (smart note system, built by notes.js) -->
<main id="page-notes" class="wrap" style="display:none"></main>

<!-- settings / backup / pronunciation-engine modal (built by app.js) -->
<div id="modal-overlay" style="display:none"></div>

<footer>
  毎日少しずつ。 一歩ずつ。 <span id="footer-motto">· 每天一点点，一步一步来。</span><br>
  <span style="opacity:.6" id="footer-note">进度自动保存在本机浏览器 · 真人音频(VOICEVOX)，缺失时回退系统语音 · 录音与发音评估请用本地服务器(localhost)打开</span>
</footer>

<!-- pre-generated audio manifest (VOICEVOX). Loaded as a script so real-voice audio
     works even on file:// (double-click), where fetch() is blocked. Absent until you
     run tools/gen_audio.py — harmless 404 if missing. -->
<script src="audio/manifest.js?v=20260604z24"></script>
<!-- selectable voice models for the ⚙ 声音 picker -->
<script src="audio/voices.js?v=20260604z24"></script>
<script src="js/lessons.js?v=20260604z24"></script>
<script src="js/i18n-en.js?v=20260604z24"></script>
<script src="js/i18n-ja.js?v=20260604z24"></script>
<script src="js/reference.js?v=20260604z24"></script>
<script src="js/gojuon.js?v=20260604z24"></script>
<script src="js/scenarios.js?v=20260604z24"></script>
<script src="js/scenarios-adult.js?v=20260604z24"></script>
<script src="js/tests.js?v=20260604z24"></script>
<script src="js/daily.js?v=20260604z24"></script>
<script src="js/listening.js?v=20260604z24"></script>
<script src="js/app.js?v=20260604z24"></script>
<!-- 智能笔记系统 -->
<script src="js/notes.js?v=20260604z24"></script>
<!-- AI 学习助手 (Claude, BYOK) -->
<script src="js/assistant.js?v=20260604z24"></script>
<!-- ✍️ 練習 — production exercises (per-day, Claude on-demand + offline fallback) -->
<script src="js/exercises.js?v=20260604z24"></script>
<!-- 🗣️ 产出 — dedicated production gym (build/write/speak; separate top-level tab) -->
<script src="js/produce.js?v=20260604z24"></script>
<!-- 📝 N2 考试中心 — exam guide + realistic full mock w/ JLPT scoring -->
<script src="js/exam.js?v=20260604z24"></script>
<!-- 🥚 学习宠物 (study pet, v1.1 Phase A) -->
<script src="js/pet.js?v=20260604z24"></script>
</body>
</html>
